<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>트럭 이미지 분류기</title>

<style>
body{
    font-family: Arial, sans-serif;
    max-width: 1000px;
    margin: 30px auto;
    padding: 20px;
}

h1{
    text-align:center;
}

button{
    padding:10px 20px;
    font-size:16px;
    cursor:pointer;
    margin-top:10px;
}

.summary{
    margin-top:20px;
    padding:15px;
    background:#f5f5f5;
    border-radius:10px;
}

.result-card{
    margin-top:15px;
    padding:15px;
    border:1px solid #ddd;
    border-radius:10px;
}

.high-confidence{
    color:green;
    font-weight:bold;
}

.medium-confidence{
    color:orange;
    font-weight:bold;
}

.low-confidence{
    color:red;
    font-weight:bold;
}
</style>

</head>
<body>

<h1>🚚 트럭 이미지 분류기</h1>

<input type="file" id="imageInput" multiple accept="image/*">

<br>

<button id="predictBtn">분류하기</button>

<div id="result"></div>

<script>

const API_URL =
"https://dur1-truck-classification.hf.space/predict_batch";

document.getElementById("predictBtn")
.addEventListener("click", async function(){

    const files =
    document.getElementById("imageInput").files;

    if(files.length === 0){
        alert("이미지를 선택하세요.");
        return;
    }

    const formData = new FormData();

    for(let i=0;i<files.length;i++){
        formData.append("files", files[i]);
    }

    const resultDiv =
    document.getElementById("result");

    resultDiv.innerHTML =
    "<h2>분류 중...</h2>";

    try{

        const response =
        await fetch(API_URL,{
            method:"POST",
            body:formData
        });

        const data =
        await response.json();

        let truckCount = 0;
        let nonTruckCount = 0;

        const classCounts = {
            "1톤트럭":0,
            "트럭아님":0,
            "밴":0,
            "카고트럭":0,
            "탑차":0
        };

        data.results.forEach(item=>{

            if(item.error) return;

            if(item.is_truck)
                truckCount++;
            else
                nonTruckCount++;

            classCounts[item.class_name]++;
        });

        let html = "";

        html += `
        <div class="summary">
            <h2>📊 종합 결과</h2>

            <p><b>총 이미지:</b>
            ${data.total}장</p>

            <p><b>트럭:</b>
            ${truckCount}장</p>

            <p><b>비트럭:</b>
            ${nonTruckCount}장</p>

            <hr>

            <h3>차종별 개수</h3>

            <ul>
                <li>1톤트럭 :
                ${classCounts["1톤트럭"]}장</li>

                <li>탑차 :
                ${classCounts["탑차"]}장</li>

                <li>카고트럭 :
                ${classCounts["카고트럭"]}장</li>

                <li>밴 :
                ${classCounts["밴"]}장</li>

                <li>트럭아님 :
                ${classCounts["트럭아님"]}장</li>
            </ul>
        </div>

        <h2>📷 개별 결과</h2>
        `;

        data.results.forEach(item=>{

            if(item.error){

                html += `
                <div class="result-card">
                    <b>${item.filename}</b>
                    <br>
                    오류:
                    ${item.error}
                </div>
                `;
                return;
            }

            let confidenceClass =
            "low-confidence";

            if(item.confidence >= 0.8)
                confidenceClass =
                "high-confidence";
            else if(item.confidence >= 0.5)
                confidenceClass =
                "medium-confidence";

            const probs =
            Object.entries(item.probabilities)
            .sort((a,b)=>b[1]-a[1]);

            html += `
            <div class="result-card">

                <h3>${item.filename}</h3>

                <p>
                <b>예측 결과:</b>
                ${item.class_name}
                </p>

                <p>
                <b>트럭 여부:</b>
                ${item.is_truck ? "예" : "아니오"}
                </p>

                <p class="${confidenceClass}">
                신뢰도 :
                ${(item.confidence*100).toFixed(1)}%
                </p>

                <hr>

                <b>상위 3개 후보</b>

                <ol>
                    <li>
                    ${probs[0][0]}
                    (${(probs[0][1]*100).toFixed(1)}%)
                    </li>

                    <li>
                    ${probs[1][0]}
                    (${(probs[1][1]*100).toFixed(1)}%)
                    </li>

                    <li>
                    ${probs[2][0]}
                    (${(probs[2][1]*100).toFixed(1)}%)
                    </li>
                </ol>

            </div>
            `;
        });

        resultDiv.innerHTML = html;

    }
    catch(error){

        resultDiv.innerHTML =
        "<h2>오류 발생</h2><p>"
        + error.message +
        "</p>";
    }

});

</script>

</body>
</html>
